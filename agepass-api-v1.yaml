openapi: 3.1.0
info:
  title: "AgePass — Infrastructure de conformité du retrait autonome"
  version: "2.0.0"
  description: >
    AgePass est l'infrastructure de conformité pour le retrait autonome de
    produits soumis à conditions réglementaires (casiers connectés,
    click-and-collect, drives robotisés). Cette API n'est pas une simple
    fonction de vérification d'identité ponctuelle : elle sécurise
    juridiquement l'ensemble du parcours, de la vérification de la personne
    jusqu'à la preuve de remise effective du produit.
    AgePass ne stocke jamais de données d'identité ou de date de naissance :
    seul un résultat binaire (vérifié / non vérifié) est retourné, conformément
    aux obligations légales applicables à la vente et à la remise de produits
    soumis à une condition d'âge.


    ## Démarrage rapide


    - **URL de base** : `https://api.agepass.fr/v1`

    - **Authentification** : en-tête `Authorization: Bearer vk_test_xxxxxxxxxxxxxxxx`

    - **Premier appel** : `POST /v1/sessions`


    ## Comment ça marche


    | Étape métier | Où dans l'API |

    |---|---|

    | 1. Produit +18 détecté | Le partenaire connaît son catalogue : il transmet `required_age` et `product_categories` à la création de session. Hors périmètre AgePass. |

    | 2. Identité | Redirection vers `verification_url` (page hébergée AgePass) : capture du document d'identité, consentement explicite avant toute capture biométrique. |

    | 3. Biométrie | Sur la même page : vérification biométrique éphémère (liveness + correspondance visage/document), via des partenaires spécialisés sélectionnés selon des exigences de disponibilité et de conformité. |

    | 4. Jeton horodaté | Une fois validée, AgePass émet un `unlock_token` signé et horodaté, transmis via le webhook `session.completed` et lisible sur `GET /sessions/{id}`. |

    | 5. Ouverture casier | Le casier vérifie localement la signature du `unlock_token` (clé publique exposée sur `/.well-known/jwks.json`) et déclenche l'ouverture physique. |

    | 6. Confirmation physique | Le casier confirme via `POST /sessions/{id}/confirm-unlock` que le produit a été remis (ou non) — ferme la chaîne de preuve. |


    ```

    Produit +18 détecté

          │

          ▼

    POST /sessions

          │

          ▼

    verification_url ──► Identité + biométrie (utilisateur)

          │

          ▼

    session.completed (webhook) ──► unlock_token signé

          │

          ▼

    Ouverture casier (vérification JWKS locale)

          │

          ▼

    confirm-unlock ──► Preuve de conformité (proof)

    ```


    > **Répartition des responsabilités — détection produit.** Le tag "produit
    > soumis à condition d'âge" est porté par le système d'information du
    > distributeur (PIM/ERP). AgePass ne référence pas de catalogue produit :
    > `required_age` et `product_categories` sont réputés déjà qualifiés par
    > le distributeur. AgePass prend le relais à partir de la vérification de
    > la personne (étapes 2 à 6).


    ## Environnements


    | Mode | Clé API | Usage |

    |---|---|---|

    | **Test** | `vk_test_…` | Intégration et développement. Données isolées, vérification simulée. Accessible immédiatement, sans validation commerciale préalable. |

    | **Production** | `vk_live_…` | Vérifications réelles. |


    Les données ne traversent jamais d'un mode à l'autre : une session créée
    en test n'est pas visible en production et inversement. Le mode est
    déterminé uniquement par le préfixe de la clé API utilisée — aucun
    paramètre de mode à transmettre séparément. Même URL de base pour les deux
    environnements.


    ## Disponibilité, hébergement & SLA


    - **Objectif de disponibilité : 99,9 %.**

    - **Hébergement & souveraineté.** Les traitements et journaux applicatifs
      sont hébergés au sein de l'Union Européenne.

    - **Maintenance planifiée** communiquée au moins 72h à l'avance.

    - **Status page** disponible sur demande auprès de votre interlocuteur AgePass.


    ## Versionnage & gestion des breaking changes


    - Le chemin `/v1` est la version majeure du contrat. Tout changement non
      rétrocompatible sera livré sous une nouvelle version majeure (`/v2`),
      jamais en place sur `/v1`.

    - Les évolutions rétrocompatibles (nouveaux champs optionnels, nouveaux
      endpoints) sont livrées au sein de `/v1` et tracées au changelog ci-dessous.

    - En complément, l'en-tête `Accept: application/vnd.agepass.v1+json` peut
      être envoyé pour figer explicitement le contrat consommé ; la réponse
      porte le même `Content-Type`.

    - Tout champ ou endpoint déprécié est annoncé avec un préavis minimum de
      6 mois, signalé via les en-têtes HTTP `Deprecation` et `Sunset`
      (RFC 8594) avant suppression effective.


    ## Limites de débit


    Chaque réponse porte les en-têtes `X-RateLimit-Limit`,
    `X-RateLimit-Remaining` et `X-RateLimit-Reset` (300 requêtes/minute par
    client). Au-delà du quota : `429 Too Many Requests` avec en-tête `Retry-After`.


    ## Traçabilité des requêtes


    Le client peut envoyer un en-tête `X-Correlation-Id` (UUID) sur n'importe
    quelle requête ; il est repris à l'identique dans la réponse. S'il est
    absent, AgePass en génère un. Très utile pour faire correspondre vos logs
    et les nôtres en cas de support ou de débogage.


    ## Présenter l'interface à l'utilisateur


    Trois façons d'amener votre utilisateur vers `verification_url` :


    **a) Iframe (intégration web)**


    ```html

    <iframe src="VERIFICATION_URL" allow="camera" width="100%" height="700"></iframe>

    ```


    L'autorisation `allow="camera"` est nécessaire pour la vérification
    biométrique. À la fin du parcours, l'interface envoie un message via
    `postMessage` que vous pouvez écouter pour piloter votre UI (fermer une
    modale, afficher votre propre écran) — vérifiez toujours `event.origin`.
    **Ce message sert uniquement à piloter votre interface : le résultat
    officiel doit toujours être confirmé côté serveur via le webhook ou
    l'API**, jamais à partir de ce signal côté navigateur.


    **b) Redirection / lien direct**


    Ouvrez `verification_url` dans le navigateur de l'utilisateur (nouvel
    onglet, redirection, WebView mobile).


    **c) QR code**


    Encodez `verification_url` dans un QR code affiché sur le casier/kiosque.
    L'utilisateur scanne et réalise la vérification sur son propre appareil —
    utile pour les parcours sur deux appareils.


    ## Sécurité


    - **Identité du partenaire.** `retailer_id` n'est jamais transmis dans le
      body : il est dérivé côté serveur de la clé API utilisée pour l'appel.
      Un partenaire ne peut donc jamais agir au nom d'un autre.

    - **Rotation de la clé API.** Affichée intégralement une seule fois, à la
      création. Conservez-la immédiatement dans un coffre à secrets. En cas de
      fuite, une rotation depuis le tableau de bord invalide immédiatement
      l'ancienne clé.

    - **Cloisonnement des ressources (anti-IDOR).** Toutes les opérations sur
      `/sessions/{id}` vérifient que la session appartient au partenaire
      authentifié. Sinon : `404` (jamais `403`).

    - **Propriété du casier.** `locker_id` doit être enregistré pour le
      partenaire authentifié — `403 RETAILER_FORBIDDEN` s'il appartient à un
      autre partenaire, `404 LOCKER_NOT_FOUND` s'il est totalement inconnu.

    - **Idempotence.** `POST /sessions` requiert un en-tête `Idempotency-Key`.

    - **Anti-replay.** Le `unlock_token` porte un identifiant unique (`jti`),
      à invalider après la première ouverture. Sa durée de validité est
      portée explicitement par `unlock_token_expires_at`.

    - **Rotation des clés de signature.** Les clés signant `unlock_token` et
      `proof_signature` (distinctes de votre clé API) peuvent être renouvelées
      sans interruption de service : plusieurs clés peuvent coexister
      simultanément dans le JWKS durant les périodes de transition, chacune
      identifiée par son `kid`.

    - **Authenticité du webhook.** En-tête `AgePass-Signature` (HMAC-SHA256).
      Seul le `unlock_token` (signature vérifiée via JWKS) doit déclencher
      une action physique.

    - **`callback_url`.** Doit correspondre à un domaine pré-enregistré à
      l'onboarding (`400 CALLBACK_URL_NOT_ALLOWED` sinon).

    - **Usage unique de `verification_url`.** Invalidée après complétion ou
      expiration.

    - **Intégrité du certificat.** `ComplianceProof` porte une signature
      numérique (`proof_signature`), vérifiable via la même clé JWKS.


    ## Conformité réglementaire (RGPD / protection des mineurs)


    - **Hébergement.** Voir la section *Disponibilité, hébergement & SLA* ci-dessus.

    - **Traitement biométrique éphémère (art. 9 RGPD).** Consentement
      explicite avant toute capture. Aucune donnée biométrique brute
      conservée au-delà de la session active.

    - **AIPD** tenue à disposition de l'autorité de contrôle.

    - **Partenaires de vérification biométrique.** AgePass s'appuie sur des
      partenaires spécialisés de vérification biométrique, sélectionnés selon
      des exigences de disponibilité et de conformité. Les traitements sont
      encadrés conformément aux exigences applicables du RGPD.

    - **Droit à la révision humaine (art. 22 RGPD).** Voir
      `POST /sessions/{id}/appeal`.

    - **Chaîne de preuve fermée.** Voir `POST /sessions/{id}/confirm-unlock`.

    - **Horodatage.** Tous les horodatages exposés par l'API sont exprimés en
      UTC, format ISO-8601.

    - **Gestion des incidents.** En cas d'incident de sécurité affectant des
      données personnelles, AgePass applique une procédure de gestion des
      incidents conforme aux exigences du RGPD.


    ## Codes d'erreur


    Distinction importante : les codes ci-dessous qualifient un problème de
    **requête HTTP**. Le motif d'un **rejet de vérification** (la requête a
    réussi, la personne n'a pas été validée) est porté séparément par
    `Session.rejection_reason` — ce n'est pas une erreur HTTP.


    **Erreurs de requête (`error.code`)**


    | Code | HTTP | Description |

    |---|---|---|

    | INVALID_REQUEST | 400 | Requête malformée ou champ invalide |

    | CALLBACK_URL_NOT_ALLOWED | 400 | Domaine non pré-enregistré pour ce partenaire |

    | UNAUTHORIZED | 401 | Clé API absente ou invalide |

    | RETAILER_FORBIDDEN | 403 | locker_id enregistré pour un autre partenaire |

    | LOCKER_NOT_FOUND | 404 | Aucun casier enregistré avec cet identifiant |

    | SESSION_NOT_FOUND | 404 | Session inexistante ou hors périmètre du partenaire |

    | IDEMPOTENCY_KEY_CONFLICT | 409 | Idempotency-Key déjà utilisée avec un payload différent |

    | RATE_LIMIT_EXCEEDED | 429 | Quota de requêtes dépassé |


    **Motifs de rejet (`Session.rejection_reason`, hors HTTP)**


    | Code | Description |

    |---|---|

    | AGE_NOT_VERIFIED | Âge requis non confirmé par les éléments présentés |

    | DOCUMENT_INVALID | Document d'identité illisible, expiré ou non reconnu |

    | LIVENESS_FAILED | Échec du contrôle de vivacité biométrique |


    ## Exploitation


    - **Supervision.** `GET /health` (non authentifié, réponse volontairement
      minimale).

    - **Audit.** `GET /sessions` — pagination par curseur (stable), tri par
      défaut sur `created_at` (décroissant), filtres sur la création
      (`from`/`to`) et sur la remise physique confirmée
      (`unlock_confirmed_from`/`unlock_confirmed_to`).

    - **Conservation des preuves.** La durée de conservation est configurable
      contractuellement et explicitée dans le contrat de service.

    - **Résilience du webhook.** Backoff exponentiel sur 24h (8 tentatives) en
      cas de non-2xx ; `GET /sessions/{id}` en filet de sécurité.

    - **SDK.** Aucun SDK officiel à ce stade. Intégration HTTP directe — un
      SDK (JS, Python…) pourra être envisagé selon l'adoption.


    ## Changelog


    | Version | Contenu |

    |---|---|

    | 1.0.0 → 1.10.0 | Voir historique précédent (sessions, preuve, JWT/OAuth2, idempotence, anti-IDOR, confirm-unlock, appeal, SLA, correlation ID...) |

    | 2.0.0 | Authentification simplifiée en clé API (`vk_test_`/`vk_live_`, alignée sur l'implémentation réelle), URL de base unique, ajout de l'option d'intégration iframe, démarrage rapide explicite, schéma de flux en texte |
  contact:
    name: AgePass Support
    email: contact@agepass.fr
    url: https://agepass.fr

servers:
  - url: https://api.agepass.fr/v1
    description: Plateforme — le mode (test/production) est déterminé par le préfixe de la clé API

security:
  - ApiKeyAuth: []

tags:
  - name: Monitoring
    description: Supervision du service
  - name: Auth
    description: Vérification des clés de signature (JWKS) pour les jetons d'ouverture
  - name: Sessions
    description: Création, suivi, audit et confirmation physique des sessions
  - name: Proof
    description: Récupération de la preuve de conformité

paths:
  /health:
    get:
      tags: [Monitoring]
      summary: Vérifier la disponibilité du service
      description: >
        Réponse volontairement minimale (aucune information de version ou de
        dépendance technique exposée sur cet endpoint non authentifié).
      security: []
      responses:
        '200':
          description: Service opérationnel
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: "ok"
                  timestamp:
                    type: string
                    format: date-time
                    example: "2026-06-23T10:15:00Z"
              example:
                status: "ok"
                timestamp: "2026-06-23T10:15:00Z"

  /.well-known/jwks.json:
    get:
      tags: [Auth]
      summary: Clé publique de vérification (JWKS)
      description: >
        Vérification locale et hors-ligne du unlock_token et du
        proof_signature — indépendant de la clé API. Format JWKS standard
        (RFC 7517). Plusieurs clés peuvent être publiées simultanément durant
        les périodes de rotation, chacune identifiée par son kid.
      security: []
      responses:
        '200':
          description: Jeu de clés publiques
          content:
            application/json:
              schema:
                type: object
                properties:
                  keys:
                    type: array
                    items:
                      type: object

  /sessions:
    post:
      tags: [Sessions]
      summary: Créer une session de vérification d'âge
      description: >
        Le retailer_id est dérivé de la clé API utilisée, jamais du body. Le
        locker_id doit être enregistré pour ce partenaire.
      parameters:
        - $ref: '#/components/parameters/IdempotencyKey'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CreateSessionRequest'
            example:
              locker_id: "LCK-STETIENNE-014"
              order_id: "CMD-2026-88231"
              required_age: 18
              product_categories: ["alcohol"]
              callback_url: "https://partner.example.com/webhooks/agepass"
      responses:
        '201':
          description: Session créée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '403':
          $ref: '#/components/responses/RetailerForbidden'
        '404':
          $ref: '#/components/responses/LockerNotFound'
        '409':
          description: Idempotency-Key déjà utilisée avec un payload différent (code IDEMPOTENCY_KEY_CONFLICT)
        '429':
          $ref: '#/components/responses/TooManyRequests'

    get:
      tags: [Sessions]
      summary: Lister les sessions du partenaire authentifié
      description: >
        Résultats automatiquement limités au retailer_id dérivé de la clé API.
        Tri par défaut : created_at décroissant. Pour retrouver des remises
        physiques sur une période donnée, utiliser
        unlock_confirmed_from/unlock_confirmed_to plutôt que from/to.
      parameters:
        - name: status
          in: query
          schema:
            type: string
            enum: [pending, in_progress, verified, rejected, under_appeal, expired, cancelled]
        - name: locker_id
          in: query
          schema:
            type: string
        - name: from
          in: query
          schema:
            type: string
            format: date-time
        - name: to
          in: query
          schema:
            type: string
            format: date-time
        - name: unlock_confirmed_from
          in: query
          schema:
            type: string
            format: date-time
        - name: unlock_confirmed_to
          in: query
          schema:
            type: string
            format: date-time
        - name: sort
          in: query
          schema:
            type: string
            enum: [asc, desc]
            default: desc
        - name: limit
          in: query
          schema:
            type: integer
            default: 25
            maximum: 100
        - name: cursor
          in: query
          schema:
            type: string
      responses:
        '200':
          description: Liste paginée des sessions
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/SessionList'
        '401':
          $ref: '#/components/responses/Unauthorized'
        '429':
          $ref: '#/components/responses/TooManyRequests'

  /sessions/{session_id}:
    get:
      tags: [Sessions]
      summary: Récupérer le statut d'une session
      description: Retourne 404 SESSION_NOT_FOUND si la session n'existe pas OU n'appartient pas au partenaire authentifié.
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Statut courant de la session
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '404':
          $ref: '#/components/responses/NotFound'

  /sessions/{session_id}/cancel:
    post:
      tags: [Sessions]
      summary: Annuler une session en cours
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Session annulée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Session déjà finalisée

  /sessions/{session_id}/confirm-unlock:
    post:
      tags: [Sessions]
      summary: Confirmer le résultat physique de l'ouverture
      description: >
        Appelé par le contrôleur du casier après vérification locale de la
        signature du unlock_token. Referme la chaîne de preuve.
      parameters:
        - $ref: '#/components/parameters/SessionId'
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UnlockConfirmation'
            example:
              outcome: "opened"
              confirmed_at: "2026-06-23T10:17:55Z"
      responses:
        '200':
          description: Confirmation enregistrée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: unlock_token déjà consommé ou confirmation déjà reçue

  /sessions/{session_id}/appeal:
    post:
      tags: [Sessions]
      summary: Demander une révision humaine d'un rejet automatique
      description: >
        Art. 22 RGPD. Disponible uniquement si status="rejected". Fait passer
        la session en status="under_appeal" ; la résolution est notifiée via
        le webhook session.completed.
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '202':
          description: Demande de révision enregistrée
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Session'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Session pas au statut "rejected", ou révision déjà demandée

  /sessions/{session_id}/proof:
    get:
      tags: [Proof]
      summary: Récupérer la preuve de conformité
      description: >
        Disponible si status="verified" ou "rejected". Atteste la
        vérification de la personne et, si disponible, la remise effective du
        produit. Aucune donnée d'identité.
      parameters:
        - $ref: '#/components/parameters/SessionId'
      responses:
        '200':
          description: Certificat de conformité
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ComplianceProof'
        '404':
          $ref: '#/components/responses/NotFound'
        '409':
          description: Session pas encore finalisée

webhooks:
  sessionCompleted:
    post:
      summary: Notification de fin de vérification (actif)
      description: >
        Seul événement actuellement émis. Envoyé lorsque le statut passe à
        "verified", "rejected" ou "expired" (y compris après une révision
        d'appel). Seul le unlock_token (signature vérifiée via JWKS) doit
        déclencher une action physique. Retry avec backoff exponentiel
        pendant 24h (8 tentatives) en cas de non-2xx.
      parameters:
        - name: AgePass-Signature
          in: header
          required: true
          schema:
            type: string
          description: HMAC-SHA256 du corps brut, secret partagé à l'onboarding.
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookPayload'
      responses:
        '200':
          description: Accusé de réception par le partenaire

  sessionCreated:
    post:
      summary: Notification de création de session (réservé — non émis en v2.0)
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookPayload'
      responses:
        '200':
          description: Accusé de réception

  sessionExpired:
    post:
      summary: Notification d'expiration dédiée (réservé — non émis en v2.0)
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookPayload'
      responses:
        '200':
          description: Accusé de réception

  sessionCancelled:
    post:
      summary: Notification d'annulation dédiée (réservé — non émis en v2.0)
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookPayload'
      responses:
        '200':
          description: Accusé de réception

  sessionAppealCreated:
    post:
      summary: Notification de demande de révision (réservé — non émis en v2.0)
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/WebhookPayload'
      responses:
        '200':
          description: Accusé de réception

components:
  securitySchemes:
    ApiKeyAuth:
      type: http
      scheme: bearer
      bearerFormat: API Key
      description: >
        Clé API transmise en en-tête Authorization: Bearer vk_test_... ou
        vk_live_.... Le préfixe détermine l'environnement (test/production).
        La clé est strictement secrète : ne jamais l'exposer côté navigateur,
        application mobile ou dépôt de code public.

  parameters:
    SessionId:
      name: session_id
      in: path
      required: true
      schema:
        type: string
        format: uuid
    IdempotencyKey:
      name: Idempotency-Key
      in: header
      required: true
      schema:
        type: string
      description: UUID v4 généré côté client. Un retry avec la même clé renvoie la session déjà créée.

  schemas:
    CreateSessionRequest:
      type: object
      description: retailer_id n'est volontairement pas un champ de ce body, dérivé de la clé API utilisée.
      required: [locker_id, required_age, product_categories]
      properties:
        locker_id:
          type: string
          description: Doit être enregistré pour le partenaire authentifié.
        order_id:
          type: string
        required_age:
          type: integer
          example: 18
          minimum: 0
          maximum: 99
        product_categories:
          type: array
          items:
            type: string
            enum: [alcohol, vape, cbd]
        callback_url:
          type: string
          format: uri
          description: Doit correspondre à un domaine pré-enregistré à l'onboarding.

    UnlockConfirmation:
      type: object
      required: [outcome]
      properties:
        outcome:
          type: string
          enum: [opened, failed, timeout]
        confirmed_at:
          type: string
          format: date-time
          description: UTC, ISO-8601.

    Session:
      type: object
      properties:
        session_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, in_progress, verified, rejected, under_appeal, expired, cancelled]
        locker_id:
          type: string
        retailer_id:
          type: string
          description: Dérivé de la clé API utilisée, jamais du body client.
        required_age:
          type: integer
        age_verified:
          type: boolean
          nullable: true
        rejection_reason:
          type: string
          nullable: true
          enum: [AGE_NOT_VERIFIED, DOCUMENT_INVALID, LIVENESS_FAILED]
        verification_url:
          type: string
          format: uri
          description: Usage unique, invalidée après complétion ou expiration.
        unlock_token:
          type: string
          nullable: true
          description: JWT signé, présent uniquement si status="verified". Claim jti à invalider après la première ouverture.
        unlock_token_expires_at:
          type: string
          format: date-time
          nullable: true
        unlock_outcome:
          type: string
          nullable: true
          enum: [opened, failed, timeout]
        unlock_confirmed_at:
          type: string
          format: date-time
          nullable: true
        created_at:
          type: string
          format: date-time
        expires_at:
          type: string
          format: date-time
        verified_at:
          type: string
          format: date-time
          nullable: true

    SessionList:
      type: object
      properties:
        data:
          type: array
          items:
            $ref: '#/components/schemas/Session'
        next_cursor:
          type: string
          nullable: true

    ComplianceProof:
      type: object
      properties:
        proof_id:
          type: string
          format: uuid
        session_id:
          type: string
          format: uuid
        compliance_reference:
          type: string
          example: "AGP-2026-088231"
        age_verified:
          type: boolean
        required_age:
          type: integer
        rejection_reason:
          type: string
          nullable: true
          enum: [AGE_NOT_VERIFIED, DOCUMENT_INVALID, LIVENESS_FAILED]
        verification_method:
          type: string
          enum: [identity_document_biometric_match, facial_age_estimation_liveness]
          example: "identity_document_biometric_match"
        verified_at:
          type: string
          format: date-time
        issued_at:
          type: string
          format: date-time
        qualified_timestamp:
          type: string
          description: Horodatage électronique conforme eIDAS (art. 41).
        unlock_outcome:
          type: string
          nullable: true
          enum: [opened, failed, timeout]
        unlock_confirmed_at:
          type: string
          format: date-time
          nullable: true
        legal_basis:
          type: string
          description: Référence à la base légale applicable selon la catégorie de produit — à confirmer avec votre service juridique.
          example: "Obligations légales applicables à la vente et à la remise de produits soumis à une condition d'âge"
        certificate_url:
          type: string
          format: uri
        proof_signature:
          type: string
          description: Signature JWS du contenu du certificat, vérifiable via JWKS.

    WebhookPayload:
      type: object
      properties:
        event:
          type: string
          example: "session.completed"
        session_id:
          type: string
          format: uuid
        status:
          type: string
          enum: [pending, verified, rejected, under_appeal, expired, cancelled]
        age_verified:
          type: boolean
        rejection_reason:
          type: string
          nullable: true
          enum: [AGE_NOT_VERIFIED, DOCUMENT_INVALID, LIVENESS_FAILED]
        locker_id:
          type: string
        unlock_token:
          type: string
          nullable: true
        unlock_token_expires_at:
          type: string
          format: date-time
          nullable: true
        verified_at:
          type: string
          format: date-time

    Error:
      type: object
      properties:
        error:
          type: object
          properties:
            code:
              type: string
              enum:
                - INVALID_REQUEST
                - CALLBACK_URL_NOT_ALLOWED
                - UNAUTHORIZED
                - RETAILER_FORBIDDEN
                - LOCKER_NOT_FOUND
                - SESSION_NOT_FOUND
                - IDEMPOTENCY_KEY_CONFLICT
                - RATE_LIMIT_EXCEEDED
            message:
              type: string

  responses:
    BadRequest:
      description: Requête invalide (INVALID_REQUEST ou CALLBACK_URL_NOT_ALLOWED)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: "INVALID_REQUEST"
              message: "required_age must be an integer between 0 and 99."
    Unauthorized:
      description: Clé API absente ou invalide
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: "UNAUTHORIZED"
              message: "Missing or invalid API key."
    RetailerForbidden:
      description: locker_id enregistré pour un autre partenaire
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: "RETAILER_FORBIDDEN"
              message: "This locker_id belongs to another retailer."
    LockerNotFound:
      description: Aucun casier enregistré avec cet identifiant
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: "LOCKER_NOT_FOUND"
              message: "No locker registered with this id."
    NotFound:
      description: Session introuvable (inexistante ou hors périmètre du partenaire)
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: "SESSION_NOT_FOUND"
              message: "No session found for this id."
    TooManyRequests:
      description: Quota de requêtes dépassé
      headers:
        Retry-After:
          schema:
            type: integer
      content:
        application/json:
          schema:
            $ref: '#/components/schemas/Error'
          example:
            error:
              code: "RATE_LIMIT_EXCEEDED"
              message: "Rate limit exceeded, retry after the delay indicated."
